
name: Download File to Repository

on:
  workflow_dispatch:  # Allows manual triggering of the workflow

jobs:
  download-file:
    runs-on: ubuntu-latest

    env:
      FILE_URL: https://github.com/D1menc1a/dnstt-android-proxy/releases/download/v1.0.0-doh/dnstt.apk
      FILE_NAME: dnstt.apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history to allow pushing back

      - name: Create files directory if not exists
        run: mkdir -p files

      - name: Download file
        run: |
          curl -L -f $FILE_URL -o files/$FILE_NAME
          # -f flag ensures curl fails on HTTP errors

      - name: Check if file was downloaded successfully
        run: |
          if [ ! -f "files/$FILE_NAME" ]; then
            echo "Error: File was not downloaded successfully"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          # Check if there are changes to commit
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git add files/$FILE_NAME
            git commit -m "Download file $FILE_NAME from $FILE_URL"
            git push origin main  # Specify branch explicitly
          fi